<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 330" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060913" />
      <stop offset="50%" stop-color="#03050a" />
      <stop offset="100%" stop-color="#010204" />
    </linearGradient>

    <!-- Glowing Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="30%" stop-color="#8b5cf6" />
      <stop offset="70%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Cyberpunk grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.015" stroke-width="1"/>
    </pattern>

    <!-- Filters for heavy neon glow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.7"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Fonts styling */
    .font-mono {
      font-family: 'Fira Code', 'JetBrains Mono', Consolas, Monaco, monospace;
    }
    .font-sans {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
    }

    /* Interactive 3D Perspective Tilt on the entire card */
    .banner-card {
      transform-style: preserve-3d;
      perspective: 1000px;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
      cursor: pointer;
    }
    
    /* When the user hovers over the SVG, tilt and scale slightly in 3D */
    svg:hover .banner-card {
      transform: rotateX(2.5deg) rotateY(-2.5deg) translateZ(10px);
    }
    
    /* Blinking Terminal Cursor */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor {
      animation: blink 1s infinite;
      fill: #bc8cff;
    }

    /* Floating geometrical elements */
    @keyframes float-shape {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(8deg); }
    }
    .floating-accent-1 {
      animation: float-shape 6s ease-in-out infinite;
      transform-origin: 650px 120px;
    }
    .floating-accent-2 {
      animation: float-shape 9s ease-in-out infinite;
      transform-origin: 730px 220px;
    }

    /* Rotating perspective cyber ring */
    @keyframes spin-perspective {
      0% { transform: rotateX(60deg) rotateY(0deg) rotateZ(0deg); }
      100% { transform: rotateX(60deg) rotateY(0deg) rotateZ(360deg); }
    }
    .cyber-ring-1 {
      transform-origin: 670px 165px;
      animation: spin-perspective 15s linear infinite;
    }
    .cyber-ring-2 {
      transform-origin: 670px 165px;
      animation: spin-perspective 10s linear infinite reverse;
    }

    /* Core Pulsing Glow */
    @keyframes core-pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); }
      50% { transform: scale(1.06); filter: drop-shadow(0 0 25px rgba(236, 72, 153, 0.7)); }
    }
    .core-shield {
      animation: core-pulse 4s ease-in-out infinite;
      transform-origin: 670px 165px;
    }

    /* Neon grid scroll simulation */
    @keyframes grid-scroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(30px); }
    }
    .scrolling-grid {
      animation: grid-scroll 8s linear infinite;
    }

    /* Border breathing animation */
    @keyframes border-glow {
      0%, 100% { stroke-opacity: 0.5; }
      50% { stroke-opacity: 1; stroke-width: 2.2px; }
    }
    .terminal-window {
      fill: url(#bg-grad);
      stroke: url(#border-grad);
      stroke-width: 1.5px;
      rx: 20px;
      animation: border-glow 5s ease-in-out infinite;
    }
  </style>

  <!-- Main Perspective Wrapper -->
  <g class="banner-card">
    <!-- Background Card -->
    <rect x="15" y="15" width="820" height="300" class="terminal-window" />
    
    <!-- Cyberpunk Scrolling Grid Pattern Overlay -->
    <g opacity="0.45" clip-path="url(#card-clip)">
      <rect x="17" y="17" width="816" height="296" fill="url(#grid)" />
    </g>
    
    <clipPath id="card-clip">
      <rect x="17" y="17" width="816" height="296" rx="19" />
    </clipPath>

    <!-- Terminal Window Top Bar Controls -->
    <g transform="translate(38, 38)">
      <circle cx="0" cy="0" r="6" fill="#ff5f56" />
      <circle cx="20" cy="0" r="6" fill="#ffbd2e" />
      <circle cx="40" cy="0" r="6" fill="#27c93f" />
    </g>
    
    <!-- Centered terminal status title -->
    <text x="425" y="43" fill="#4b5563" font-size="12" font-weight="600" class="font-mono" text-anchor="middle">
      chenul@cyber-host:~
    </text>

    <!-- Vertical Split Divider Line with neon dash flow -->
    <line x1="510" y1="65" x2="510" y2="295" stroke="#1f2937" stroke-width="1" stroke-dasharray="3 3" />

    <!-- LEFT SIDE: Terminal Shell Simulator -->
    <g transform="translate(45, 85)" class="font-mono" font-size="14" fill="#e5e7eb">
      <!-- Terminal prompt row 1 -->
      <text x="0" y="0" font-size="17" font-weight="700" fill="#f3f4f6">
        $ <tspan fill="#3b82f6">neofetch</tspan>
      </text>

      <!-- Terminal content rows -->
      <g transform="translate(10, 28)">
        <text x="0" y="0" fill="#a855f7" font-weight="600">user</text>
        <text x="100" y="0" fill="#9ca3af">:</text>
        <text x="120" y="0" fill="#ffffff" font-weight="700">Chenul Thenuwara</text>
      </g>

      <g transform="translate(10, 52)">
        <text x="0" y="0" fill="#a855f7" font-weight="600">role</text>
        <text x="100" y="0" fill="#9ca3af">:</text>
        
        <!-- Live switching terminal roles -->
        <text x="120" y="0" fill="#3b82f6" font-weight="700">
          <animate attributeName="opacity" values="1;0;0;1;1" keyTimes="0;0.22;0.5;0.52;1" dur="7s" repeatCount="indefinite" />
          Full Stack Developer
        </text>
        <text x="120" y="0" fill="#ec4899" font-weight="700" opacity="0">
          <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.25;0.47;0.5;1" dur="7s" repeatCount="indefinite" />
          Creative Code Maker
        </text>
        <text x="120" y="0" fill="#10b981" font-weight="700" opacity="0">
          <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.5;0.52;0.72;0.97;1" dur="7s" repeatCount="indefinite" />
          UI/UX Developer
        </text>
        <text x="120" y="0" fill="#f59e0b" font-weight="700" opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;0;1" keyTimes="0;0.75;0.77;0.97;0.97;1" dur="7s" repeatCount="indefinite" />
          AI Explorer
        </text>
      </g>

      <g transform="translate(10, 76)">
        <text x="0" y="0" fill="#a855f7" font-weight="600">status</text>
        <text x="100" y="0" fill="#9ca3af">:</text>
        <text x="120" y="0" fill="#10b981">● Active <tspan fill="#6b7280" font-weight="normal">(Aesthetics + Scale)</tspan></text>
      </g>

      <g transform="translate(10, 100)">
        <text x="0" y="0" fill="#a855f7" font-weight="600">system</text>
        <text x="100" y="0" fill="#9ca3af">:</text>
        <text x="120" y="0" fill="#ffffff">React, Next.js, Node.js, TS</text>
      </g>

      <!-- Second simulated Command Block -->
      <g transform="translate(0, 140)">
        <text x="0" y="0" font-weight="700" fill="#f3f4f6">
          $ <tspan fill="#3b82f6">cat</tspan> core.log
        </text>
        <text x="10" y="24" fill="#9ca3af" font-size="13">
          &gt;&gt; Design is the silent ambassador of ideas.
        </text>
        <text x="10" y="42" fill="#9ca3af" font-size="13">
          &gt;&gt; Code is poetry that runs in real-time.
        </text>
      </g>

      <!-- Running Command status -->
      <g transform="translate(0, 205)">
        <text x="0" y="0" font-weight="700" fill="#f3f4f6">
          $ <tspan fill="#10b981">deploy</tspan> future_ideas.sh
        </text>
        <!-- Blinking cursor at the end of typing command -->
        <rect x="250" y="-12" width="7" height="15" class="cursor" />
      </g>
    </g>

    <!-- RIGHT SIDE: Awwwards-style 3D Geometric Vector Graphic -->
    <!-- Floating particles around structure -->
    <g class="floating-accent-1">
      <polygon points="620,80 635,90 625,105 610,95" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5" />
      <circle cx="575" cy="180" r="3" fill="#ec4899" opacity="0.6" filter="url(#text-glow)" />
    </g>
    
    <g class="floating-accent-2">
      <circle cx="735" cy="225" r="5.5" fill="none" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.7" />
      <polygon points="720,70 730,65 735,75" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.4" />
    </g>

    <!-- Concentric Rings Rotating in 3D Perspective (tilt + rotate) -->
    <!-- Center of orbit is (670, 165) -->
    <g class="cyber-ring-1">
      <ellipse cx="670" cy="165" rx="80" ry="75" fill="none" stroke="url(#text-grad)" stroke-width="1.5" stroke-opacity="0.5" filter="url(#text-glow)" />
      <circle cx="590" cy="165" r="4.5" fill="#ffffff" filter="url(#text-glow)"/>
    </g>
    
    <g class="cyber-ring-2">
      <ellipse cx="670" cy="165" rx="100" ry="45" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="10 30" stroke-opacity="0.6" />
      <circle cx="770" cy="165" r="4" fill="#a855f7" filter="url(#text-glow)"/>
    </g>

    <!-- Pulsing Outer Hexagon Core -->
    <g class="core-shield">
      <circle cx="670" cy="165" r="55" fill="none" stroke="#1f2937" stroke-width="1" />
      
      <!-- Inner Design Element -->
      <g transform="translate(670, 165)">
        <!-- Beautiful neon hexagon -->
        <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="#030712" stroke="url(#text-grad)" stroke-width="2.5" filter="url(#neon-glow)" />
        
        <!-- Nested inner frame -->
        <path d="M-12,-8 L0,-18 L12,-8 L12,8 L0,18 L-12,8 Z" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.8" />
        
        <!-- Logo typography -->
        <text x="0" y="5" font-size="16" font-weight="900" fill="#ffffff" class="font-sans" text-anchor="middle" letter-spacing="1">
          CT
        </text>
      </g>
    </g>

    <!-- Node connections linking to the center core -->
    <line x1="670" y1="105" x2="670" y2="128" stroke="#3b82f6" stroke-width="1.2" opacity="0.5" />
    <line x1="610" y1="165" x2="633" y2="165" stroke="#a855f7" stroke-width="1.2" opacity="0.5" />
    <line x1="730" y1="165" x2="707" y2="165" stroke="#ec4899" stroke-width="1.2" opacity="0.5" />
    <line x1="670" y1="225" x2="670" y2="202" stroke="#10b981" stroke-width="1.2" opacity="0.5" />
  </g>

  <!-- Glowing neon floor highlight line -->
  <line x1="45" y1="324" x2="805" y2="324" stroke="url(#border-grad)" stroke-width="2" stroke-linecap="round" opacity="0.75" />
</svg>
