<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 24" width="100%" height="24" fill="none">
  <defs>
    <!-- Vibrant Gradient matching Lando Norris F1 style -->
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="35%" stop-color="#dfff00" />
      <stop offset="70%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <!-- Speed Lines Pattern -->
    <pattern id="speed-stripes" width="20" height="24" patternUnits="userSpaceOnUse">
      <line x1="0" y1="24" x2="10" y2="0" stroke="#dfff00" stroke-width="4" stroke-opacity="0.15" />
      <line x1="10" y1="24" x2="20" y2="0" stroke="#00f0ff" stroke-width="4" stroke-opacity="0.08" />
    </pattern>
    
    <filter id="neon-glow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes speed-flow {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    .laser-line {
      stroke: url(#div-grad);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 140 660;
      animation: speed-flow 3.5s linear infinite;
    }
    .background-track {
      stroke: #141923;
      stroke-width: 2.5;
      stroke-linecap: round;
    }
    @keyframes stripes-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(20px); }
    }
    .scrolling-stripes {
      animation: stripes-scroll 1s linear infinite;
    }
  </style>
  
  <!-- Scrolling Motorsport background speed stripes -->
  <g class="scrolling-stripes">
    <rect x="-20" y="0" width="840" height="24" fill="url(#speed-stripes)" />
  </g>

  <!-- Background tracking line -->
  <line x1="15" y1="12" x2="785" y2="12" class="background-track" />
  
  <!-- Pulsing high-speed neon laser stripe -->
  <line x1="15" y1="12" x2="785" y2="12" class="laser-line" filter="url(#neon-glow)" />
</svg>
