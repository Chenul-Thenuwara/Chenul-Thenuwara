<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="20" fill="none">
  <defs>
    <!-- Glowing Holographic Gradient -->
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.1" />
      <stop offset="25%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="75%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.1" />
    </linearGradient>

    <filter id="neon-glow" x="-10%" y="-150%" width="120%" height="400%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pulse-flow {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    .pulse-line {
      stroke: url(#div-grad);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 100 700;
      animation: pulse-flow 4s linear infinite;
    }
    .track-line {
      stroke: #121820;
      stroke-width: 1.2;
      stroke-opacity: 0.6;
      stroke-linecap: round;
    }
    @keyframes orb-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .accent-dots {
      fill: #ffffff;
      opacity: 0.5;
      animation: orb-pulse 2s infinite ease-in-out;
    }
  </style>

  <!-- Track -->
  <line x1="15" y1="10" x2="785" y2="10" class="track-line" />
  
  <!-- Flowing Laser Line -->
  <line x1="15" y1="10" x2="785" y2="10" class="pulse-line" filter="url(#neon-glow)" />

  <!-- Abstract End Points -->
  <circle cx="15" cy="10" r="1.5" class="accent-dots" />
  <circle cx="785" cy="10" r="1.5" class="accent-dots" style="animation-delay: 1s;" />
</svg>
