<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 330" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a" />
      <stop offset="50%" stop-color="#020306" />
      <stop offset="100%" stop-color="#010103" />
    </linearGradient>

    <!-- Holographic Brand Gradients (Cyber-Minimalist) -->
    <linearGradient id="holo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <linearGradient id="border-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <!-- Fine Tech Dot Grid -->
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#ffffff" fill-opacity="0.04" />
    </pattern>

    <!-- Neon Glow Filters -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Custom Typography */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&amp;family=Fira+Code:wght@500;700&amp;family=Caveat:wght@700&amp;family=Caveat+Brush&amp;display=swap');
    
    .font-sans {
      font-family: 'Outfit', -apple-system, sans-serif;
    }
    .font-mono {
      font-family: 'Fira Code', monospace;
    }
    .font-handwritten {
      font-family: 'Caveat', cursive;
    }
    .font-handwritten-brush {
      font-family: 'Caveat Brush', cursive;
    }

    /* 3D Perspective Tilt on entire card */
    .workbench-card {
      transform-style: preserve-3d;
      perspective: 1000px;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }
    svg:hover .workbench-card {
      transform: rotateX(2.5deg) rotateY(-2.5deg) translateZ(12px);
    }

    /* Shifting background holographic lights */
    @keyframes orb-move {
      0%, 100% { transform: translate(0px, 0px) scale(1); opacity: 0.2; }
      50% { transform: translate(60px, -30px) scale(1.15); opacity: 0.35; }
    }
    .glowing-orb-1 {
      animation: orb-move 10s ease-in-out infinite;
      transform-origin: 0px 0px;
    }
    
    /* Blinking typing cursor */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor {
      animation: blink 1s infinite;
      fill: #00f0ff;
    }



    /* Core pulsing wave scale */
    @keyframes core-pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.4)); }
      50% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 25px rgba(255, 0, 127, 0.6)); }
    }
    .core-sphere {
      animation: core-pulse 4s ease-in-out infinite;
      transform-origin: 0px 0px;
    }

    /* Text gradient wave scroll */
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating syntax keywords in background */
    @keyframes float-tag {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.15; }
      50% { transform: translateY(-10px) rotate(3deg); opacity: 0.35; }
    }
    .float-syntax-1 { animation: float-tag 7s ease-in-out infinite; }
    .float-syntax-2 { animation: float-tag 9s ease-in-out infinite; }
    
    /* Code typing animation */
    @keyframes type-role {
      0%, 90%, 100% { content: "Software Engineer"; }
      25%, 55% { content: "Full-Stack Developer"; }
      60%, 85% { content: "Creative Tech Maker"; }
    }
    
    /* Border pulse */
    @keyframes border-breathing {
      0%, 100% { stroke-opacity: 0.4; }
      50% { stroke-opacity: 0.9; stroke-width: 2px; }
    }
    .workbench-border {
      fill: url(#bg-grad);
      stroke: url(#border-glow-grad);
      stroke-width: 1.5;
      rx: 20px;
      animation: border-breathing 4s ease-in-out infinite;
    }
  </style>

  <!-- Main Perspective Wrapper -->
  <g class="workbench-card">
    <!-- Outer Card Frame -->
    <rect x="15" y="15" width="820" height="300" class="workbench-border" />
    
    <!-- Background Grid -->
    <rect x="17" y="17" width="816" height="296" rx="19" fill="url(#dot-grid)" />

    <!-- Shifting Aurora Orbs in the background -->
    <g clip-path="url(#card-clip)">
      <g transform="translate(650, 120)">
        <circle cx="0" cy="0" r="130" fill="#a855f7" opacity="0.15" class="glowing-orb-1" filter="url(#neon-glow)" />
      </g>
      <g transform="translate(200, 220)">
        <circle cx="0" cy="0" r="100" fill="#00f0ff" opacity="0.08" class="glowing-orb-1" filter="url(#neon-glow)" style="animation-delay: -3s;" />
      </g>
    </g>
    
    <clipPath id="card-clip">
      <rect x="17" y="17" width="816" height="296" rx="19" />
    </clipPath>

    <!-- Interactive Window Control Badges (Cyber Minimalist Style) -->
    <g transform="translate(38, 38)" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1">
      <line x1="0" y1="0" x2="20" y2="0" />
      <line x1="30" y1="0" x2="50" y2="0" />
      <line x1="60" y1="0" x2="80" y2="0" />
    </g>
    
    <!-- Status Indicator -->
    <g transform="translate(740, 30)">
      <circle cx="10" cy="10" r="4" fill="#00f0ff" filter="url(#subtle-glow)">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
      </circle>
      <text x="22" y="14" fill="#6b7280" font-size="10" font-weight="700" class="font-sans">ONLINE</text>
    </g>

    <!-- Floating Code Symbols (Abstract Tech Vibes) -->
    <g font-size="12" fill="#a855f7" class="font-mono" font-weight="700">
      <text x="50" y="290" class="float-syntax-1">&lt;/&gt;</text>
      <text x="320" y="55" class="float-syntax-2">{}</text>
      <text x="490" y="275" class="float-syntax-1" style="animation-delay: -3s;">await</text>
      <text x="210" y="45" class="float-syntax-2" style="animation-delay: -4s;">const</text>
    </g>

    <!-- LEFT SIDE: Glassmorphic Personal Identity -->
    <g transform="translate(45, 60)" class="font-sans">
      <!-- Handwritten Signature Block (Martin Heinz style) -->
      <g transform="translate(0, 25) rotate(-5)">
        <text x="0" y="0" font-size="36" fill="#00f0ff" class="font-handwritten-brush" filter="url(#subtle-glow)">
          Chenul Thenuwara
        </text>
        <text x="8" y="24" font-size="20" fill="#9ca3af" class="font-handwritten">
          Software Engineer
        </text>
      </g>

      <!-- Live Code Block display -->
      <g transform="translate(2, 95)" class="font-mono" font-size="13" fill="#9ca3af">
        <text x="0" y="10" fill="#a855f7" font-weight="700">const<tspan fill="#ffffff"> developer</tspan> = {</text>
        
        <text x="20" y="30" fill="#00f0ff" opacity="1">
          <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.30;0.33;0.63;0.66;0.97;1" dur="6s" repeatCount="indefinite" />
          role: "Software Engineer",
        </text>
        <text x="20" y="30" fill="#a855f7" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.30;0.33;0.63;0.66;0.97;1" dur="6s" repeatCount="indefinite" />
          role: "Full-Stack Developer",
        </text>
        <text x="20" y="30" fill="#ff007f" opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.30;0.33;0.63;0.66;0.97;1" dur="6s" repeatCount="indefinite" />
          role: "DevOps &amp; Automation",
        </text>
        
        <text x="20" y="50">focus: <tspan fill="#00f0ff">["Full_Stack", "Gen_AI", "DevOps"]</tspan>,</text>
        <text x="20" y="70">passions: <tspan fill="#00f0ff">["Automation", "New_Tech", "Coding"]</tspan>,</text>
        <text x="20" y="90">education: <tspan fill="#00f0ff">"BSc Hons SE (Plymouth)"</tspan></text>
        
        <text x="0" y="110" fill="#a855f7" font-weight="700">};</text>
      </g>

      <!-- Live status cursor block at bottom -->
      <g transform="translate(2, 230)" class="font-mono" font-size="12" fill="#6b7280">
        <text x="0" y="0">&gt; npm run innovate</text>
        <rect x="140" y="-11" width="7" height="13" class="cursor" />
      </g>
    </g>

    <!-- RIGHT SIDE: Titanium (Ti) Atomic Structure (Element 22: 2, 8, 10, 2) -->
    <g transform="translate(675, 165)">
      
      <!-- Shell 1: 2 Electrons (Cyan, rx=45, ry=18, tilted 15deg) -->
      <g transform="rotate(15)">
        <path d="M -45,0 A 45,18 0 1,0 45,0 A 45,18 0 1,0 -45,0" fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3 3" />
        <circle r="2.5" fill="#00f0ff" filter="url(#subtle-glow)">
          <animateMotion dur="4s" repeatCount="indefinite" path="M -45,0 A 45,18 0 1,0 45,0 A 45,18 0 1,0 -45,0" begin="0s" />
        </circle>
        <circle r="2.5" fill="#00f0ff" filter="url(#subtle-glow)">
          <animateMotion dur="4s" repeatCount="indefinite" path="M -45,0 A 45,18 0 1,0 45,0 A 45,18 0 1,0 -45,0" begin="-2s" />
        </circle>
      </g>

      <!-- Shell 2: 8 Electrons (Purple, rx=65, ry=26, tilted -30deg) -->
      <g transform="rotate(-30)">
        <path d="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.3" />
        <circle r="2.5" fill="#a855f7" filter="url(#subtle-glow)">
          <animateMotion dur="6s" repeatCount="indefinite" path="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" begin="0s" />
        </circle>
        <circle r="2.5" fill="#a855f7" filter="url(#subtle-glow)">
          <animateMotion dur="6s" repeatCount="indefinite" path="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" begin="-0.75s" />
        </circle>
        <circle r="2.5" fill="#a855f7" filter="url(#subtle-glow)">
          <animateMotion dur="6s" repeatCount="indefinite" path="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" begin="-1.5s" />
        </circle>
        <circle r="2.5" fill="#a855f7" filter="url(#subtle-glow)">
          <animateMotion dur="6s" repeatCount="indefinite" path="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" begin="-2.25s" />
        </circle>
        <circle r="2.5" fill="#a855f7" filter="url(#subtle-glow)">
          <animateMotion dur="6s" repeatCount="indefinite" path="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" begin="-3s" />
        </circle>
        <circle r="2.5" fill="#a855f7" filter="url(#subtle-glow)">
          <animateMotion dur="6s" repeatCount="indefinite" path="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" begin="-3.75s" />
        </circle>
        <circle r="2.5" fill="#a855f7" filter="url(#subtle-glow)">
          <animateMotion dur="6s" repeatCount="indefinite" path="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" begin="-4.5s" />
        </circle>
        <circle r="2.5" fill="#a855f7" filter="url(#subtle-glow)">
          <animateMotion dur="6s" repeatCount="indefinite" path="M -65,0 A 65,26 0 1,0 65,0 A 65,26 0 1,0 -65,0" begin="-5.25s" />
        </circle>
      </g>

      <!-- Shell 3: 10 Electrons (Hot Pink, rx=85, ry=34, tilted 45deg) -->
      <g transform="rotate(45)">
        <path d="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" fill="none" stroke="#ff007f" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="6 3" />
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="0s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-0.8s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-1.6s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-2.4s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-3.2s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-4s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-4.8s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-5.6s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-6.4s" />
        </circle>
        <circle r="2.5" fill="#ff007f" filter="url(#subtle-glow)">
          <animateMotion dur="8s" repeatCount="indefinite" path="M -85,0 A 85,34 0 1,0 85,0 A 85,34 0 1,0 -85,0" begin="-7.2s" />
        </circle>
      </g>

      <!-- Shell 4: 2 Electrons (Cyan/White, rx=105, ry=42, tilted -60deg) -->
      <g transform="rotate(-60)">
        <path d="M -105,0 A 105,42 0 1,0 105,0 A 105,42 0 1,0 -105,0" fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.3" />
        <circle r="2.5" fill="#00f0ff" filter="url(#subtle-glow)">
          <animateMotion dur="5s" repeatCount="indefinite" path="M -105,0 A 105,42 0 1,0 105,0 A 105,42 0 1,0 -105,0" begin="0s" />
        </circle>
        <circle r="2.5" fill="#00f0ff" filter="url(#subtle-glow)">
          <animateMotion dur="5s" repeatCount="indefinite" path="M -105,0 A 105,42 0 1,0 105,0 A 105,42 0 1,0 -105,0" begin="-2.5s" />
        </circle>
      </g>

      <!-- Center Glowing Core Nucleus (Titanium Core) -->
      <g class="core-sphere">
        <circle cx="0" cy="0" r="28" fill="#04060a" stroke="url(#holo-grad)" stroke-width="3" filter="url(#neon-glow)" />
        
        <!-- Center Emblem Ti -->
        <text x="0" y="5" font-size="14" font-weight="900" fill="#ffffff" class="font-sans" text-anchor="middle" letter-spacing="0.5">Ti</text>
      </g>

      <!-- Shimmering particles floating around core -->
      <circle cx="-10" cy="-15" r="1.5" fill="#ffffff" opacity="0.3">
        <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="12" cy="10" r="2" fill="#00f0ff" opacity="0.4">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite" />
      </circle>
      <circle cx="-15" cy="8" r="1.2" fill="#ff007f" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>
</svg>
