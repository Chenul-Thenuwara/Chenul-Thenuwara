<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="20" fill="none">
  <defs>
    <!-- Gradient for the pulsing divider -->
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="15%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="85%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.2" />
    </linearGradient>
    
    <filter id="glow-div" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pulse-flow {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    .pulse-line {
      stroke: url(#div-grad);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 120 680;
      animation: pulse-flow 4s linear infinite;
    }
    .bg-line {
      stroke: #1e293b;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-opacity: 0.7;
    }
  </style>
  <!-- Background trace line -->
  <line x1="15" y1="10" x2="785" y2="10" class="bg-line" />
  <!-- Animating neon pulse line -->
  <line x1="15" y1="10" x2="785" y2="10" class="pulse-line" filter="url(#glow-div)" />
</svg>
