<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 380" width="100%" height="100%" fill="none">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060a" />
      <stop offset="50%" stop-color="#020306" />
      <stop offset="100%" stop-color="#010103" />
    </linearGradient>

    <!-- Glassmorphic Card Backgrounds -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>

    <!-- Glowing Cyber-Minimalist Border Gradient -->
    <linearGradient id="border-holo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.4" />
    </linearGradient>

    <!-- Text Gradients -->
    <linearGradient id="grad-text-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#8c8cff" />
    </linearGradient>

    <linearGradient id="grad-text-holo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <!-- Dot Pattern -->
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#ffffff" fill-opacity="0.04" />
    </pattern>

    <!-- Filters for Glows -->
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    <![CDATA[
    /* Styling and Custom Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Fira+Code:wght@500;700&display=swap');
    
    .font-sans {
      font-family: 'Outfit', -apple-system, sans-serif;
    }
    .font-mono {
      font-family: 'Fira Code', monospace;
    }

    /* Slanted text styles */
    .slanted-text {
      font-style: italic;
      text-transform: uppercase;
    }

    /* Card Interactive hover styling */
    .bento-card {
      fill: url(#card-grad);
      stroke: url(#border-holo);
      stroke-width: 1.5;
      rx: 16px;
      transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    
    .card-group {
      cursor: pointer;
    }
    .card-group:hover .bento-card {
      fill: rgba(0, 240, 255, 0.015);
      stroke-opacity: 1;
      filter: drop-shadow(0px 8px 24px rgba(168, 85, 247, 0.12));
    }

    /* Infinite Horizontal Loop Marquee */
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-800px); }
    }
    .marquee-content {
      animation: marquee 20s linear infinite;
    }
    .marquee-content:hover {
      animation-play-state: paused;
    }

    /* Floating bubbles */
    @keyframes float-node {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .bubble-1 { animation: float-node 4s ease-in-out infinite; }
    .bubble-2 { animation: float-node 6s ease-in-out infinite; }
    ]]>
  </style>

  <!-- Background Base Canvas -->
  <rect width="850" height="380" rx="20" fill="url(#bg-main)" stroke="#111827" stroke-width="2" />
  <rect width="850" height="380" rx="20" fill="url(#dot-grid)" />

  <!-- ================= CARD 1: ACADEMICS AND BIO (TOP: 820x180) ================= -->
  <g class="card-group" transform="translate(15, 15)">
    <rect width="820" height="180" class="bento-card" />
    
    <!-- Title / Tag -->
    <rect x="25" y="25" width="100" height="26" rx="13" fill="#00f0ff" fill-opacity="0.1" stroke="#00f0ff" stroke-opacity="0.3" />
    <text x="75" y="42" font-size="10" font-weight="700" fill="#00f0ff" class="font-mono" text-anchor="middle">ACADEMICS</text>
    
    <!-- Bold Typography Heading -->
    <text x="25" y="85" font-size="28" font-weight="900" fill="#ffffff" class="font-sans" letter-spacing="-0.5">
      BSc Hons <tspan fill="url(#grad-text-blue)">Software Engineering</tspan>
    </text>
    
    <text x="25" y="120" font-size="14" fill="#e5e7eb" font-weight="700" class="font-sans">NSBM Green University / Plymouth University</text>
    
    <!-- Bio info columns (2-column layout to fill width nicely) -->
    <g transform="translate(25, 138)" font-size="12.5" fill="#9ca3af" class="font-sans" font-weight="600">
      <text x="0" y="10">• Final-year Undergraduate (Graduating Nov 2026)</text>
      <text x="0" y="28">• IT Intern at Anunine Holdings</text>
      
      <text x="410" y="10">• Focus: Full-Stack Dev &amp; Software Design</text>
      <text x="410" y="28">• Passions: Gen AI, DevOps &amp; Automation</text>
    </g>

    <!-- Floating bubbles to look interactive -->
    <circle cx="780" cy="40" r="4.5" fill="#a855f7" class="bubble-1" />
    <circle cx="795" cy="58" r="6.5" fill="#ff007f" class="bubble-2" />
  </g>

  <!-- ================= CARD 2: TECH STACK SLIDER (BOTTOM: 820x150) ================= -->
  <g class="card-group" transform="translate(15, 215)">
    <rect width="820" height="150" class="bento-card" />
    
    <text x="25" y="38" font-size="15" font-weight="900" fill="#ffffff" class="font-sans slanted-text">Core Technologies &amp; Tools</text>
    
    <!-- Horizontal Slider Clipping Mask Area -->
    <svg x="20" y="55" width="780" height="80">
      <defs>
        <clipPath id="slider-clip">
          <rect width="780" height="80" />
        </clipPath>
      </defs>
      
      <!-- Scrolling Marquee Group -->
      <g clip-path="url(#slider-clip)">
        <g class="marquee-content">
          <!-- Slide Block 1 -->
          <g transform="translate(0, 15)">
            <!-- Next.js -->
            <rect x="0" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#00f0ff" stroke-width="1" />
            <text x="50" y="27" font-size="12" font-weight="700" fill="#00f0ff" class="font-sans slanted-text" text-anchor="middle">Next.js</text>
            
            <!-- React -->
            <rect x="115" y="5" width="90" height="35" rx="10" fill="#000000" stroke="#a855f7" stroke-width="1" />
            <text x="160" y="27" font-size="12" font-weight="700" fill="#a855f7" class="font-sans slanted-text" text-anchor="middle">React</text>
            
            <!-- TypeScript -->
            <rect x="220" y="5" width="110" height="35" rx="10" fill="#000000" stroke="#ff007f" stroke-width="1" />
            <text x="275" y="27" font-size="12" font-weight="700" fill="#ff007f" class="font-sans slanted-text" text-anchor="middle">TypeScript</text>

            <!-- Flutter -->
            <rect x="345" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#ffffff" stroke-width="1" opacity="0.8" />
            <text x="395" y="27" font-size="12" font-weight="700" fill="#ffffff" class="font-sans slanted-text" text-anchor="middle">Flutter</text>
            
            <!-- Node.js -->
            <rect x="460" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#00f0ff" stroke-width="1" />
            <text x="510" y="27" font-size="12" font-weight="700" fill="#00f0ff" class="font-sans slanted-text" text-anchor="middle">Node.js</text>
            
            <!-- Firebase -->
            <rect x="575" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#a855f7" stroke-width="1" />
            <text x="625" y="27" font-size="12" font-weight="700" fill="#a855f7" class="font-sans slanted-text" text-anchor="middle">Firebase</text>

            <!-- MongoDB -->
            <rect x="690" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#ff007f" stroke-width="1" />
            <text x="740" y="27" font-size="12" font-weight="700" fill="#ff007f" class="font-sans slanted-text" text-anchor="middle">MongoDB</text>
          </g>
          
          <!-- Slide Block 2 (Duplicate for continuous loop) -->
          <g transform="translate(800, 15)">
            <!-- Next.js -->
            <rect x="0" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#00f0ff" stroke-width="1" />
            <text x="50" y="27" font-size="12" font-weight="700" fill="#00f0ff" class="font-sans slanted-text" text-anchor="middle">Next.js</text>
            
            <!-- React -->
            <rect x="115" y="5" width="90" height="35" rx="10" fill="#000000" stroke="#a855f7" stroke-width="1" />
            <text x="160" y="27" font-size="12" font-weight="700" fill="#a855f7" class="font-sans slanted-text" text-anchor="middle">React</text>
            
            <!-- TypeScript -->
            <rect x="220" y="5" width="110" height="35" rx="10" fill="#000000" stroke="#ff007f" stroke-width="1" />
            <text x="275" y="27" font-size="12" font-weight="700" fill="#ff007f" class="font-sans slanted-text" text-anchor="middle">TypeScript</text>

            <!-- Flutter -->
            <rect x="345" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#ffffff" stroke-width="1" opacity="0.8" />
            <text x="395" y="27" font-size="12" font-weight="700" fill="#ffffff" class="font-sans slanted-text" text-anchor="middle">Flutter</text>
            
            <!-- Node.js -->
            <rect x="460" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#00f0ff" stroke-width="1" />
            <text x="510" y="27" font-size="12" font-weight="700" fill="#00f0ff" class="font-sans slanted-text" text-anchor="middle">Node.js</text>
            
            <!-- Firebase -->
            <rect x="575" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#a855f7" stroke-width="1" />
            <text x="625" y="27" font-size="12" font-weight="700" fill="#a855f7" class="font-sans slanted-text" text-anchor="middle">Firebase</text>

            <!-- MongoDB -->
            <rect x="690" y="5" width="100" height="35" rx="10" fill="#000000" stroke="#ff007f" stroke-width="1" />
            <text x="740" y="27" font-size="12" font-weight="700" fill="#ff007f" class="font-sans slanted-text" text-anchor="middle">MongoDB</text>
          </g>
        </g>
      </g>
    </svg>
  </g>
</svg>
